<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Список Подписчиков</title>
    <link rel="stylesheet" href="style.css">
    <!-- Для иконок геолокации можно использовать Font Awesome или другие иконочные шрифты -->
    <!-- <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"> -->
</head>
<body>
    <div class="followers-page-container">
        <h1 class="page-title">Followers</h1>

        <div class="followers-grid">
            <!-- Пример одной карточки подписчика -->
            <div class="follower-card">
                <img src="https://via.placeholder.com/60x60/f2f2f2/888888?text=AV1" alt="Avatar of Colten Aguilar" class="follower-avatar">
                <div class="follower-info">
                    <span class="follower-name">Colten Aguilar</span>
                    <span class="follower-location">
                        <span class="location-icon">📍</span> <!-- Или <i class="fas fa-map-marker-alt"></i> -->
                        Iran
                    </span>
                </div>
                <button class="follow-button">Follow</button>
            </div>

            <div class="follower-card">
                <img src="https://via.placeholder.com/60x60/ffcccc/ff6666?text=AV2" alt="Avatar of Janiya Williamson" class="follower-avatar">
                <div class="follower-info">
                    <span class="follower-name">Janiya Williamson</span>
                    <span class="follower-location">
                        <span class="location-icon">📍</span>
                        France
                    </span>
                </div>
                <button class="follow-button">Follow</button>
            </div>

            <div class="follower-card">
                <img src="https://via.placeholder.com/60x60/e0f2f7/4fc3f7?text=AV3" alt="Avatar of Desiree Schmidt" class="follower-avatar">
                <div class="follower-info">
                    <span class="follower-name">Desiree Schmidt</span>
                    <span class="follower-location">
                        <span class="location-icon">📍</span>
                        Virgin Islands,...
                    </span>
                </div>
                <button class="follow-button">Follow</button>
            </div>

            <div class="follower-card">
                <img src="https://via.placeholder.com/60x60/d4edda/28a745?text=AV4" alt="Avatar of Selina Boyer" class="follower-avatar">
                <div class="follower-info">
                    <span class="follower-name">Selina Boyer</span>
                    <span class="follower-location">
                        <span class="location-icon">📍</span>
                        Comoros
                    </span>
                </div>
                <button class="follow-button">Follow</button>
            </div>

            <div class="follower-card">
                <img src="https://via.placeholder.com/60x60/e0f2f7/4fc3f7?text=AV5" alt="Avatar of Tiffany May" class="follower-avatar">
                <div class="follower-info">
                    <span class="follower-name">Tiffany May</span>
                    <span class="follower-location">
                        <span class="location-icon">📍</span>
                        Sweden
                    </span>
                </div>
                <!-- Кнопка "Following" с галочкой -->
                <button class="follow-button following">
                    <span class="tick-icon">✔</span> Follow
                </button>
            </div>

            <div class="follower-card">
                <img src="https://via.placeholder.com/60x60/f8d7da/dc3545?text=AV6" alt="Avatar of Amiah Pruitt" class="follower-avatar">
                <div class="follower-info">
                    <span class="follower-name">Amiah Pruitt</span>
                    <span class="follower-location">
                        <span class="location-icon">📍</span>
                        Ethiopia
                    </span>
                </div>
                <button class="follow-button">Follow</button>
            </div>

            <div class="follower-card">
                <img src="https://via.placeholder.com/60x60/f2f2f2/888888?text=AV7" alt="Avatar of Shawn Manning" class="follower-avatar">
                <div class="follower-info">
                    <span class="follower-name">Shawn Manning</span>
                    <span class="follower-location">
                        <span class="location-icon">📍</span>
                        Ethiopia
                    </span>
                </div>
                <button class="follow-button">Follow</button>
            </div>

            <div class="follower-card">
                <img src="https://via.placeholder.com/60x60/ffe0b2/ff9800?text=AV8" alt="Avatar of Reece Chung" class="follower-avatar">
                <div class="follower-info">
                    <span class="follower-name">Reece Chung</span>
                    <span class="follower-location">
                        <span class="location-icon">📍</span>
                        Denmark
                    </span>
                </div>
                <button class="follow-button">Follow</button>
            </div>

            <div class="follower-card">
                <img src="https://via.placeholder.com/60x60/b2ebf2/00bcd4?text=AV9" alt="Avatar of Lawson Bass" class="follower-avatar">
                <div class="follower-info">
                    <span class="follower-name">Lawson Bass</span>
                    <span class="follower-location">
                        <span class="location-icon">📍</span>
                        Denmark
                    </span>
                </div>
                <button class="follow-button">Follow</button>
            </div>
        </div>
    </div>
</body>
</html>
